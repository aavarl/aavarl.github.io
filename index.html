<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aavar Lamichhane</title>

  <link rel="shortcut icon" href="./assets/images/logo.ico" type="image/x-icon">
  <link rel="stylesheet" href="./assets/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    .nav-toggle-btn {
      display: none;
      background: transparent;
      border: 0;
      color: inherit;
      font-size: 24px;
      cursor: pointer;
    }

    .navbar-list {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .navbar-link {
      padding: 10px 18px !important;
      white-space: nowrap;
    }

    /* Fixed Sidebar Logic */
    .sidebar-info_more {
      display: none;
    }

    .sidebar-info_more.open {
      display: block !important;
    }

    .service-icon-box ion-icon {
      font-size: 40px;
      color: var(--orange-yellow-crayola, #ffd15b);
    }

    .experience-photo {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      border-radius: 10px;
      margin-top: 12px;
      background: hsl(240, 2%, 12%);
      border: 1px solid hsl(240, 2%, 20%);
      display: block;
    }

    .service-item-title a {
      color: inherit;
      text-decoration: none;
    }

    .service-item-title a:hover {
      text-decoration: underline;
    }

    .contact-form {
      background: var(--bg-gradient-onyx, hsl(240, 1%, 25%));
      padding: 20px;
      border-radius: 14px;
      margin-top: 20px;
    }

    .contact-form .form-title {
      color: var(--white-2, #f2f2f2);
      font-size: var(--fs-3, 20px);
      font-weight: var(--fw-500, 500);
      margin-bottom: 12px;
    }

    .contact-form p {
      color: var(--light-gray-70, hsl(0, 0%, 84%));
      font-size: var(--fs-6, 14px);
      line-height: 1.6;
    }

    .contact-form a {
      color: var(--orange-yellow-crayola, #ffd15b);
      font-weight: var(--fw-500, 500);
      text-decoration: none;
    }

    .contact-form a:hover {
      text-decoration: underline;
    }

    @media (min-width: 769px) {
      .avatar-box {
        width: 110px !important;
        height: 110px !important;
      }

      .avatar-box img {
        width: 100% !important;
        height: 100% !important;
        object-fit: cover;
      }

      .info-content .title {
        font-size: 15px;
        line-height: 1.5;
        margin-top: 8px;
      }
    }

    @media (max-width: 768px) {
      .nav-toggle-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .navbar-list {
        display: none;
        flex-direction: column;
        width: 100%;
      }

      .navbar-list.open {
        display: flex;
      }
    }
  </style>
</head>

<body>

  <main>
    <aside class="sidebar" data-sidebar>
      <div class="sidebar-info">
        <figure class="avatar-box">
          <img src="./assets/images/my-avatar.png" alt="Aavar Lamichhane" width="80">
        </figure>

        <div class="info-content">
          <h1 class="name" title="Aavar Lamichhane">Aavar Lamichhane</h1>
          <p class="title">Aspiring AI-Aware Medical Professional</p>
        </div>

        <button class="info_more-btn" data-sidebar-btn type="button" aria-expanded="false">
          <span>Show Contacts</span>
          <ion-icon name="chevron-down"></ion-icon>
        </button>
      </div>

      <div class="sidebar-info_more">
        <div class="separator"></div>
        <ul class="contacts-list">
          <li class="contact-item">
            <div class="icon-box"><ion-icon name="mail-outline"></ion-icon></div>
            <div class="contact-info">
              <p class="contact-title">Email</p>
              <a href="mailto:aavarlamichhane@gmail.com" class="contact-link">aavarlamichhane@gmail.com</a>
            </div>
          </li>
          <li class="contact-item">
            <div class="icon-box"><ion-icon name="calendar-outline"></ion-icon></div>
            <div class="contact-info">
              <p class="contact-title">Birthday</p>
              <time datetime="1982-06-23">August, 2011</time>
            </div>
          </li>
          <li class="contact-item">
            <div class="icon-box"><ion-icon name="location-outline"></ion-icon></div>
            <div class="contact-info">
              <p class="contact-title">Location</p>
              <address>Dallas, Texas, USA</address>
            </div>
          </li>
          <li class="contact-item">
            <div class="icon-box"><ion-icon name="logo-linkedin"></ion-icon></div>
            <div class="contact-info">
              <p class="contact-title">LinkedIn</p>
              <a href="https://www.linkedin.com/in/aavar-lamichhane-447ab4421" target="_blank" rel="noopener noreferrer" class="contact-link">View Profile</a>
            </div>
          </li>
          <li class="contact-item">
            <div class="icon-box"><ion-icon name="school-outline"></ion-icon></div>
            <div class="contact-info">
              <p class="contact-title">Google Scholar</p>
              <a href="https://scholar.google.com/citations?user=0-fhT1kAAAAJ&hl=en&oi=ao" target="_blank" rel="noopener noreferrer" class="contact-link">View Profile</a>
            </div>
          </li>
        </ul>
      </div>
    </aside>

    <div class="main-content">
      <nav class="navbar">
        <button class="nav-toggle-btn" data-nav-toggle type="button" aria-expanded="false">
          <ion-icon name="menu-outline"></ion-icon>
        </button>
        <ul class="navbar-list" data-navbar-list>
          <li class="navbar-item"><button class="navbar-link active" data-nav-link data-target="about" type="button">About</button></li>
          <li class="navbar-item"><button class="navbar-link" data-nav-link data-target="goals" type="button">Goals</button></li>
          <li class="navbar-item"><button class="navbar-link" data-nav-link data-target="education" type="button">Education</button></li>
          <li class="navbar-item"><button class="navbar-link" data-nav-link data-target="nepal" type="button">Nepal</button></li>
          <li class="navbar-item"><button class="navbar-link" data-nav-link data-target="experiences" type="button">Experiences</button></li>
          <li class="navbar-item"><button class="navbar-link" data-nav-link data-target="contact" type="button">Contact</button></li>
        </ul>
      </nav>
      </div>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const sidebarBtn = document.querySelector('[data-sidebar-btn]');
      const sidebarMore = document.querySelector('.sidebar-info_more');
      const navToggle = document.querySelector('[data-nav-toggle]');
      const navbarList = document.querySelector('[data-navbar-list]');
      const navLinks = document.querySelectorAll('[data-nav-link]');
      const pages = document.querySelectorAll('[data-page]');

      if (sidebarBtn && sidebarMore) {
        sidebarBtn.addEventListener('click', function () {
          const open = sidebarMore.classList.toggle('open');
          sidebarBtn.setAttribute('aria-expanded', open ? 'true' : 'false');
        });
      }

      if (navToggle && navbarList) {
        navToggle.addEventListener('click', function () {
          const open = navbarList.classList.toggle('open');
          navToggle.setAttribute('aria-expanded', open ? 'true' : 'false');
        });
      }

      navLinks.forEach((link) => {
        link.addEventListener('click', function () {
          const target = this.dataset.target;
          navLinks.forEach((item) => item.classList.remove('active'));
          pages.forEach((page) => page.classList.remove('active'));
          this.classList.add('active');
          const targetPage = document.querySelector('[data-page="' + target + '"]');
          if (targetPage) targetPage.classList.add('active');
          if (navbarList) navbarList.classList.remove('open');
          if (navToggle) navToggle.setAttribute('aria-expanded', 'false');
        });
      });
    });
  </script>
  <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
</body>
</html>
